<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAARF RENT CAR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:black;
color:white;
}

/* HEADER /
.header{
text-align:center;
padding:20px;
background:linear-gradient(to bottom, #000, #111);
}

.title{
font-size:26px;
font-weight:800;
color:gold;
}

.subtitle{
font-size:14px;
color:#ccc;
}

/ GRID /
.fleet{
display:grid;
grid-template-columns:1fr;
gap:15px;
padding:15px;
}

/ CARD /
.car{
position:relative;
border-radius:15px;
overflow:hidden;
height:220px;
}

/ IMAGE /
.car img{
width:100%;
height:100%;
object-fit:cover;
}

/ OVERLAY /
.overlay{
position:absolute;
bottom:0;
width:100%;
padding:15px;
background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/ TEXT /
.car-name{
font-size:18px;
font-weight:bold;
color:gold;
}

.price{
font-size:16px;
margin-top:5px;
}

/ BUTTON /
.btn{
margin-top:10px;
display:inline-block;
background:#25D366;
padding:10px 15px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
}

/ FLOAT WHATSAPP */
.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
}
</style>
</head>

<body>

<div class="header">
<div class="title">LAARF RENT CAR</div>
<div class="subtitle">Location de voitures à Marrakech</div>
</div>

<div class="fleet">

<!-- Porsche -->
<div class="car">
<img src="https://picsum.photos/400/300?random=1">
<div class="overlay">
<div class="car-name">Porsche Macan</div>
<div class="price">2000 DH / jour</div>
<a href="https://wa.me/212664781956?text=Porsche Macan" class="btn">WhatsApp</a>
</div>
</div>

<!-- Golf -->
<div class="car">
<img src="https://picsum.photos/400/300?random=2">
<div class="overlay">
<div class="car-name">Golf 8.5 Style</div>
<div class="price">800 DH / jour</div>
<a href="https://wa.me/212664781956?text=Golf Style" class="btn">WhatsApp</a>
</div>
</div>

<!-- Mercedes -->
<div class="car">
<img src="https://picsum.photos/400/300?random=3">
<div class="overlay">
<div class="car-name">Classe A</div>
<div class="price">1200 DH / jour</div>
<a href="https://wa.me/212664781956?text=Classe A" class="btn">WhatsApp</a>
</div>
</div>

<!-- Clio -->
<div class="car">
<img src="https://picsum.photos/400/300?random=4">
<div class="overlay">
<div class="car-name">Clio 5</div>
<div class="price">300 DH / jour</div>
<a href="https://wa.me/212664781956?text=Clio 5" class="btn">WhatsApp</a>
</div>
</div>

</div>

<a href="https://wa.me/212664781956" class="float">💬</a>

</body>
</html>
